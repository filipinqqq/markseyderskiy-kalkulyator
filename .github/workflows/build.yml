name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "Маркшейдерский_калькулятор" маркшейдерский.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: Маркшейдерский_калькулятор_Windows
        path: dist/Маркшейдерский_калькулятор.exe
